<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>MarmotteMovie</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#121212',
                        cardBg: '#1E1E1E',
                    }
                }
            }
        }
    </script>
</h:head>
<h:body class="bg-[#121212] text-gray-100 font-sans antialiased">

    <header class="border-b border-gray-800 bg-[#1E1E1E]/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h:link outcome="catalog" styleClass="text-2xl font-black tracking-wider text-red-500 uppercase no-underline">MarmotteMovie</h:link>
            <nav class="flex items-center space-x-6">
                <h:link value="Catalogee" outcome="catalog"
                        styleClass="text-sm font-semibold text-gray-300 hover:text-red-500 transition"/>
                <h:link value="My Rentals" outcome="rentals"
                        styleClass="text-sm font-semibold text-gray-300 hover:text-red-500 transition"/>
                <h:panelGroup rendered="#{request.isUserInRole('manager')}">
                    <h:link value="Admin Panel" outcome="admin"
                            styleClass="text-sm font-semibold text-yellow-400 hover:text-yellow-300 transition"/>
                </h:panelGroup>
                <h:panelGroup rendered="#{rentalBean.loggedInUser != null}"
                              styleClass="bg-gray-800 px-4 py-2 rounded-full flex items-center space-x-2">
                    <span class="text-xs text-gray-400">#{rentalBean.loggedInUser.firstname} #{rentalBean.loggedInUser.lastname}</span>
                    <span class="text-xs text-gray-600">|</span>
                    <span class="text-xs text-gray-400">Wallet:</span>
                    <span class="text-sm font-bold text-green-400">
                        CHF #{rentalBean.loggedInUser.balance}
                    </span>
                </h:panelGroup>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <ui:insert name="content" />
    </main>

</h:body>
</html>
