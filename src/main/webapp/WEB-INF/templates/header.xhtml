<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <header class="border-b border-gray-800 bg-[#1E1E1E]/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

            <div class="flex items-center space-x-3">
                <h1 class="text-2xl font-black tracking-wider text-red-500 uppercase">
                    MarmotteMovie
                </h1>
            </div>

            <nav class="flex items-center space-x-8">
                <h:link value="Catalog" outcome="catalog"
                        class="text-sm font-semibold text-gray-300 hover:text-red-500 transition duration-200"/>
                <h:link value="My Rentals" outcome="rentals"
                        class="text-sm font-semibold text-gray-300 hover:text-red-500 transition duration-200"/>
                <h:panelGroup rendered="#{request.isUserInRole('manager')}">
                    <h:link value="Admin Panel" outcome="admin"
                            class="text-sm font-semibold text-yellow-400 hover:text-yellow-300 transition duration-200"/>
                </h:panelGroup>
            </nav>

            <div class="flex items-center space-x-4">
                <h:panelGroup rendered="#{rentalBean.loggedInUser != null}" layout="block"
                              styleClass="flex items-center space-x-3">
                    <span class="text-sm font-bold text-green-400 bg-green-950/50 border border-green-800 px-3 py-1 rounded-full">
                        CHF #{rentalBean.loggedInUser.balance}
                    </span>
                    <span style="color:red">
				      DEBUG: #{request.userPrincipal != null ? request.userPrincipal.name : 'NO PRINCIPAL'}
				  </span>
                </h:panelGroup>
            </div>

        </div>
    </header>

</ui:composition>
