<?xml version="1.0" encoding="UTF-8"?>
<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="content">
        <div class="mb-8">
            <h2 class="text-3xl font-extrabold tracking-tight">My Active Leases</h2>
            <p class="text-gray-400 text-sm mt-1">Track your remaining watch time for rented movies and series.</p>
        </div>

        <h:panelGroup rendered="#{empty mediaBean.myActiveRentals}" layout="block"
                      class="bg-[#1E1E1E] border border-gray-800 rounded-xl p-8 text-center">
            <h3 class="text-lg font-bold text-gray-300">No active rentals found</h3>
            <p class="text-gray-500 text-sm mt-1 mb-4">You haven't rented any content yet.</p>
            <h:link value="Browse Catalog" outcome="catalog"
                    class="inline-block bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg text-sm transition"/>
        </h:panelGroup>

        <h:panelGroup rendered="#{not empty mediaBean.myActiveRentals}" layout="block"
                      class="bg-[#1E1E1E] border border-gray-800 rounded-xl overflow-hidden shadow-xl">
            <table class="w-full text-left border-collapse">
                <thead>
                <tr class="border-b border-gray-800 bg-gray-900/50 text-xs font-semibold uppercase tracking-wider text-gray-400">
                    <th class="p-4 pl-6">Content Title</th>
                    <th class="p-4">Type</th>
                    <th class="p-4">Rental Start</th>
                    <th class="p-4">Expiration Date</th>
                    <th class="p-4 pr-6 text-right">Status</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-800/60 text-sm">
                <ui:repeat value="#{mediaBean.myActiveRentals}" var="tx">
                    <tr class="hover:bg-gray-800/30 transition">
                        <td class="p-4 pl-6">
                            <span class="font-bold text-white block">#{tx.media.title}</span>
                            <span class="text-xs text-gray-500">Directed by #{tx.media.director}</span>
                        </td>
                        <td class="p-4">
                                <span class="px-2.5 py-1 text-xs font-medium rounded-full bg-gray-800 border border-gray-700 text-gray-300">
                                    #{tx.media.class.simpleName}
                                </span>
                        </td>
                        <td class="p-4 text-gray-300">
                            <h:outputText value="#{tx.rentalStart}">
                                <f:convertToDateTime type="localDateTime" pattern="dd.MM.yyyy HH:mm" />
                            </h:outputText>
                        </td>
                        <td class="p-4 text-red-400 font-medium">
                            <h:outputText value="#{tx.rentalEnd}">
                                <f:convertToDateTime type="localDateTime" pattern="dd.MM.yyyy HH:mm" />
                            </h:outputText>
                        </td>
                        <td class="p-4 pr-6 text-right">
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-green-950/60 text-green-400 border border-green-800">
                                    <span class="w-1.5 h-1.5 rounded-full bg-green-400 mr-1.5 animate-pulse"></span>
                                    Active
                                </span>
                        </td>
                    </tr>
                </ui:repeat>
                </tbody>
            </table>
        </h:panelGroup>
    </ui:define>

</ui:composition>
