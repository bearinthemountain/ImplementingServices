<?xml version="1.0" encoding="UTF-8"?>
<ui:composition template="/WEB-INF/templates/BasicTemplate.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="content">

        <!-- Page title -->
        <div class="mb-6">
            <h2 class="text-2xl font-extrabold tracking-tight text-white">Catalog</h2>
            <p class="text-gray-400 text-sm mt-1">Browse and rent movies and series.</p>
        </div>

        <!-- Media grid -->
        <h:panelGroup rendered="#{empty rentalBean.medias}" layout="block"
                      styleClass="text-center py-16 text-gray-500">
            No media available in the catalog yet.
        </h:panelGroup>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            <ui:repeat value="#{rentalBean.medias}" var="m">
                <div class="bg-[#1E1E1E] border border-gray-800 rounded-2xl p-5 flex flex-col justify-between shadow hover:border-gray-600 transition">

                    <div>
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-xs font-semibold px-2.5 py-1 rounded-full border
                                #{m.class.simpleName == 'Movie'
                                    ? 'bg-blue-950/60 border-blue-800 text-blue-300'
                                    : 'bg-purple-950/60 border-purple-800 text-purple-300'}">
                                #{m.class.simpleName}
                            </span>
                            <span class="text-xs text-gray-500">#{m.rentalDurationInDays} day(s)</span>
                        </div>

                        <h3 class="text-lg font-bold text-white leading-snug">#{m.title}</h3>
                        <p class="text-sm text-gray-400 mt-1">#{m.director}</p>
                    </div>

                    <div class="mt-5 flex items-center justify-between">
                        <span class="text-xl font-black text-red-400">CHF #{m.price}</span>

                        <h:form>
                            <h:commandButton value="Rent"
                                             action="#{rentalBean.performRental()}"
                                             styleClass="bg-red-600 hover:bg-red-700 text-white font-bold px-5 py-2 rounded-xl text-sm border-none cursor-pointer transition">
                                <f:setPropertyActionListener target="#{rentalBean.selectedMediaId}" value="#{m.id}"/>
                            </h:commandButton>
                        </h:form>
                    </div>

                </div>
            </ui:repeat>
        </div>

    </ui:define>

</ui:composition>
