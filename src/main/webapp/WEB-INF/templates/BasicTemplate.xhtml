<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>MediaLand - Premium Streaming</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#121212',
                        cardBg: '#1E1E1E',
                    }
                }
            }
        }
    </script>
</h:head>
<h:body class="bg-[#121212] text-gray-100 font-sans antialiased">

    <header class="border-b border-gray-800 bg-[#1E1E1E]/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-wider text-red-500 uppercase">MarmotteMovie</h1>
            <nav class="flex items-center space-x-6">
                <h:link value="Catalog" outcome="catalog" class="text-sm font-semibold hover:text-red-500 transition"/>
                <div class="bg-gray-800 px-4 py-2 rounded-full flex items-center space-x-2">
                    <span class="text-xs text-gray-400">Wallet:</span>
                    <span class="text-sm font-bold text-green-400">
                        $#{mediaBean.currentViewer.balance}
                    </span>
                </div>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <ui:insert name="content" />
    </main>

</h:body>
</html>
